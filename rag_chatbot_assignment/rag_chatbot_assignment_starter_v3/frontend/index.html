<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot Starter</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo">RAG Chatbot</div>
    <nav id="main-nav" class="hidden">
      <button id="chat-menu" class="menu-button active" type="button">채팅</button>
      <button id="documents-menu" class="menu-button" type="button">문서 목록</button>
    </nav>
    <div id="user-info" class="user-info hidden">
      <span id="user-name-label"></span>
      <button id="logout-button" class="menu-button" type="button">로그아웃</button>
    </div>
  </header>

  <main class="container">
    <section id="auth-view" class="view">
      <form id="login-form" class="auth-form">
        <input id="login-email" type="email" placeholder="이메일" autocomplete="username" required />
        <input id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required />
        <button type="submit">로그인</button>
        <p class="auth-switch">계정이 없으신가요? <a href="#" id="go-to-register">회원가입</a></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input id="register-name" type="text" placeholder="이름" required />
        <input id="register-email" type="email" placeholder="이메일" autocomplete="username" required />
        <input id="register-password" type="password" placeholder="비밀번호" autocomplete="new-password" required />
        <button type="submit">회원가입</button>
        <p class="auth-switch">이미 계정이 있으신가요? <a href="#" id="go-to-login">로그인</a></p>
      </form>

      <div id="auth-status" class="status-text"></div>
    </section>

    <section id="chat-view" class="view hidden">
      <div class="chat-layout">
        <aside id="session-sidebar" class="session-sidebar">
          <button id="toggle-sidebar-button" class="toggle-sidebar-button" type="button" title="채팅방 목록 접기/펼치기">☰</button>
          <div id="session-sidebar-content" class="session-sidebar-content">
            <button id="new-session-button" class="new-session-button" type="button">+ 새 채팅</button>
            <div id="session-list" class="session-list"></div>
          </div>
        </aside>

        <div class="chat-main">
          <div class="view-title chat-view-title">
            <h1 id="current-session-title">채팅방을 선택하세요</h1>
          </div>

          <div id="chat-messages" class="chat-messages"></div>

          <div class="chat-controls">
            <select id="chat-mode-select" class="mode-select">
              <option value="manual" selected>manual</option>
              <option value="agent">agent</option>
            </select>
            <select id="explanation-level-select" class="mode-select">
              <option value="simple">간단하게</option>
              <option value="friendly" selected>친절하게</option>
              <option value="professional">전문적으로</option>
            </select>
          </div>

          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" placeholder="질문을 입력하세요" autocomplete="off" disabled />
            <button type="submit" disabled>전송</button>
          </form>
        </div>
      </div>
    </section>

    <section id="documents-view" class="view hidden">
      <div class="view-title">
        <h1>문서 목록</h1>
        <p>DB에 저장된 문서를 확인하고 새 문서를 등록합니다.</p>
      </div>

      <form id="upload-form" class="upload-form">
        <input id="document-title" type="text" placeholder="문서 제목" />
        <input id="document-file" type="file" accept=".txt,.md,.pdf" />
        <button type="submit">문서 등록</button>
      </form>

      <div id="documents-status" class="status-text">문서 목록 API를 구현하면 이 영역에 목록이 표시됩니다.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>제목</th>
              <th>파일명</th>
              <th>타입</th>
              <th>Chunk 수</th>
              <th>상태</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="documents-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
