<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot Starter</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo">RAG Chatbot</div>
    <nav>
      <button id="chat-menu" class="menu-button active" type="button">채팅</button>
      <button id="documents-menu" class="menu-button" type="button">문서 목록</button>
    </nav>
  </header>

  <main class="container">
    <section id="chat-view" class="view">
      <div class="view-title">
        <h1>문서 기반 챗봇</h1>
        <p>등록된 문서를 기반으로 질문에 답변하고 출처를 함께 표시합니다.</p>
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="message bot">
          <div class="message-role">챗봇</div>
          <div class="message-body">등록된 문서를 기반으로 답변해드립니다. 질문을 입력해보세요.</div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="질문을 입력하세요" autocomplete="off" />
        <button type="submit">전송</button>
      </form>
    </section>

    <section id="documents-view" class="view hidden">
      <div class="view-title">
        <h1>문서 목록</h1>
        <p>DB에 저장된 문서를 확인하고 새 문서를 등록합니다.</p>
      </div>

      <form id="upload-form" class="upload-form">
        <input id="document-title" type="text" placeholder="문서 제목" />
        <input id="document-file" type="file" accept=".txt,.md,.pdf" />
        <button type="submit">문서 등록</button>
      </form>

      <div id="documents-status" class="status-text">문서 목록 API를 구현하면 이 영역에 목록이 표시됩니다.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>제목</th>
              <th>파일명</th>
              <th>타입</th>
              <th>Chunk 수</th>
              <th>상태</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="documents-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
