<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LangChain FastAPI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}" />
  </head>
  <body>
    <main class="app">
      <section class="chat-shell" aria-label="챗봇">
        <header class="chat-header">
          <div>
            <p class="eyebrow">FastAPI · LangChain · LCEL</p>
            <h1>학습 챗봇</h1>
          </div>
          <select id="styleSelect" aria-label="답변 스타일">
            <option value="friendly">친절한 설명</option>
            <option value="easy">쉬운 설명</option>
            <option value="expert">전문가 설명</option>
          </select>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="bubble">
              안녕하세요. Python, FastAPI, LangChain에 대해 궁금한 것을 물어보세요.
            </div>
          </article>
        </div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder="질문을 입력하세요"
            aria-label="메시지 입력"
            required
          />
          <button id="sendButton" type="submit">전송</button>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
  </body>
</html>
